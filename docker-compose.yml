services:
  postgres:
    image: postgres:16-alpine
    container_name: fwt-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flexworktwin}
      POSTGRES_USER: ${POSTGRES_USER:-fwt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fwt}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fwt} -d ${POSTGRES_DB:-flexworktwin}"]
      interval: 5s
      timeout: 3s
      retries: 12

  n8n:
    image: n8nio/n8n:1.73.1
    container_name: fwt-n8n
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_USER_MANAGEMENT_DISABLED: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_CORS_ALLOW_ORIGIN: "http://localhost:5174,http://localhost:5175,http://127.0.0.1:5174,http://127.0.0.1:5175"
      GENERIC_TIMEZONE: Europe/Berlin
      TZ: Europe/Berlin
      # Encryption key MUST be stable across restarts so credentials remain decryptable
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-fwt-dev-not-for-prod-please-rotate}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
      - ./n8n/credentials.json:/credentials.json:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        MARKER=/home/node/.n8n/.fwt-imported
        if [ ! -f "$$MARKER" ]; then
          echo "[fwt-bootstrap] first start: importing credentials + workflows..."
          n8n import:credentials --input=/credentials.json || echo "[fwt-bootstrap] credentials import failed (continuing)"
          n8n import:workflow --separate --input=/workflows || echo "[fwt-bootstrap] workflow import failed (continuing)"
          n8n update:workflow --all --active=true || echo "[fwt-bootstrap] activate failed (continuing)"
          touch "$$MARKER"
          echo "[fwt-bootstrap] done"
        else
          echo "[fwt-bootstrap] already initialized, skipping"
        fi
        exec n8n start
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg-data:
  n8n-data:
